[username]
format = '[$user]($style)'
show_always = true
style_user = "blue bold"

[hostname]
format = '[$hostname]($style)'
style = "bold green"

[git_state]
format = '-\[[$state( $progress_current/$progress_total)]($style)\]'

[git_status]
format = '(-\[[$all_status$ahead_behind]($style)\])'
renamed = "п‘ҡ"
deleted = "у°§§"
style = "202 bold"

[fill]
symbol = " "

[cmd_duration]
format = '\[[$duration]($style)\]'
show_milliseconds = true
min_time = 500

[shell]
format = '[$indicator]($style)'
bash_indicator = "оҜҠ"
fish_indicator = "у°Ҳә"
zsh_indicator = "ZSH"
powershell_indicator = "оҜҮ"      # п‘ _
ion_indicator = "оҷ«"
elvish_indicator = "у°ҳ§"
tcsh_indicator = "TSH"
xonsh_indicator = "XSH"
cmd_indicator = "оҜ„"
nu_indicator = "NSH"
unknown_indicator = "пҡҢ"
style = "bold 238"
disabled = true

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'
symbol = "пҗҳ"
truncation_length = 6
truncation_symbol = ""

[directory]
format = '[($read_only )]($read_only_style)[$path]($style)'
truncate_to_repo = true
use_os_path_sep = true
home_symbol = "~"
style = "bold cyan"
read_only = "пҖЈ"
fish_style_pwd_dir_length = 10

[character]
success_symbol = "[уұҰ°](#01ff00)" # оӘ¶ у°Ғ” п…ё уұҰ°
error_symbol = "[уұҰ°](#ff0000)"

