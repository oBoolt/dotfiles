# Get editor completions based on the config schema
"$schema" = 'https://starsdisabled = falsehip.rs/config-schema.json'
add_newline = false
command_timeout = 1000
scan_timeout = 50
format = '''
[в•ӯв•ҙ](238)$os( - $shell) | \[$username(@$hostname)\]$git_status$git_state$all$fill$cmd_duration
[в•°в•ҙ](238)($git_branch )$directory $character'''

[os]
format = "[$symbol($type)]($style)"
style = "bold 238"
disabled = false

