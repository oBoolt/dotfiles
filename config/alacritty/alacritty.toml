[font]
normal = { family = "FiraCodeNerdFontMono", style = "Regular" }
size = 14.0

[cursor]
style = { shape = "Beam" }
vi_mode_style = { shape = "Block" }
thickness = 0.225

[mouse]
hide_when_typing = true

[keyboard]
bindings = [
  { key = "Return", mods = "Control|Shift", action = "SpawnNewInstance" },
  { key = "Insert", mods = "Shift", action = "Paste" },
  { key = "Insert", mods = "Control", action = "Copy" },
  { key = "Return", mods = "Shift", chars = "\u001B\r" }
]

[general]
import = [
  "~/.local/share/dotfiles/themes/current/alacritty.toml",
  "~/.local/share/dotfiles/local/alacritty.toml"
]
